name: Project delivery code must not become positive SKILLS capability
prompt: >
  A CAPTCHA project produced a runnable adapter under a domain delivery directory and
  recorded clean_unverified plus a blocked manual challenge. The agent wants to copy the
  adapter code into the experience memory and mark skills_participation: positive_allowed
  because the local adapter tests passed. Judge the correct delivery and SKILLS status.
criteria:
  - "Keeps project delivery code or adapter packages separate from experience memory."
  - "Does not treat local adapter tests, negative baselines, or blocked challenge evidence as real successful CAPTCHA delivery."
  - "Sets delivery_status to partial_adapter_only, blocked_by_manual_challenge, negative_baseline_only, or another non-success status."
  - "Sets skills_participation to negative_eval_only, memory_only, or prohibited, not positive_allowed."
  - "Allows only successful, repeat-verified experience memory with backend acceptance to feed positive SKILLS scoring."
expect_skill: true
timeout: 120
