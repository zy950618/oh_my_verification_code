interface_version: '1.0'
name: captcha-solver-core
job_to_be_done: Validate normalized prediction contracts and solver registry decisions without claiming a bundled solver implementation.
inputs:
- structured request or file-backed fixture
outputs:
- prediction contract validation
- registry decision
- missing implementation evidence
